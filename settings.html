<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiscordWebRichPresence - Settings</title>
<link rel="stylesheet" href="settings.css">
</head>

<body>
    <div class="popup-header">
        <img id="backImg" src="img/back.png" alt="Back">
        <label class="popup-label">Settings</label>
    </div>
    <div class="separator"></div>
    <div class="container">
        <label>Enable Join button</label>
        <div class="container-right">
            <img id="helpImg" src="img/help.png" alt="Help" title="Show the Join button (this button will be the first button and will be disabled).">
            <label class="switch">
                <input type="checkbox" id="enable-join-button-switch">
                <span class="slider"></span>
            </label>
        </div>
    </div>
    <div class="container">
        <label class="select-label">Status display type</label>
        <div class="container-right">
            <select id="status-display-type-select">
                <option value="0">Name</option>
                <option value="1">State</option>
                <option value="2">Details</option>
            </select>
        </div>
    </div>
    <div class="container">
        <label class="select-label">Activity platform</label>
        <div class="container-right">
            <select id="platform-select">
                <option value="desktop">Desktop</option>
                <option value="xbox">Xbox</option>
                <option value="samsung">Samsung</option>
                <option value="ios">iOS</option>
                <option value="android">Android</option>
                <option value="embedded">Embedded</option>
                <option value="ps4">PS4</option>
                <option value="ps5">PS5</option>
            </select>
        </div>
    </div>
    <script src="settings.js"></script>
</body>

</html>
